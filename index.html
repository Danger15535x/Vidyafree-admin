<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login — VidyaFree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <div class="admin-login-brand">
      <span class="brand-icon">🔒</span>
      <h1>VidyaFree <span class="hl">Admin</span></h1>
      <p>Manage books, papers & uploads</p>
    </div>
    <form id="adminLoginForm" class="admin-form">
      <div class="form-group">
        <label for="adminUser">Username</label>
        <input type="text" id="adminUser" placeholder="admin" value="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="adminPass">Password</label>
        <input type="password" id="adminPass" placeholder="Enter password" autocomplete="current-password">
      </div>
      <div class="form-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    <div class="admin-login-hint">
      <p>🔑 Default: <code>admin / vidyafree123</code></p>
    </div>
    <div style="text-align:center; margin-top:16px; padding-top:16px; border-top:1px solid var(--line);">
      <a href="#" id="publicSiteLink" style="font-size:.85rem; color:var(--text-soft);">← Back to Public Site</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
