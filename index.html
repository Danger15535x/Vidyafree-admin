<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - VidyaFree</title>
  <style>
    :root {
      --primary: #4f46e5; --primary-dark: #4338ca; --danger: #ef4444;
      --dark: #1e293b; --gray: #64748b; --light: #f8fafc; --white: #fff;
      --shadow: 0 10px 40px rgba(0,0,0,0.1); --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 50%, #f5f3ff 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: white; border-radius: var(--radius); padding: 2.5rem;
      box-shadow: var(--shadow); width: 100%; max-width: 420px;
      text-align: center; border: 1px solid rgba(0,0,0,0.05);
    }
    .login-logo { font-size: 3rem; margin-bottom: 0.5rem; }
    .login-card h1 { font-size: 1.6rem; color: var(--dark); margin-bottom: 0.3rem; }
    .login-card p { color: var(--gray); margin-bottom: 2rem; font-size: 0.95rem; }
    .form-group { margin-bottom: 1.2rem; text-align: left; }
    .form-group label { display: block; font-weight: 600; color: var(--dark); margin-bottom: 0.4rem; font-size: 0.9rem; }
    .form-group input {
      width: 100%; padding: 0.9rem 1rem; border: 2px solid #e2e8f0;
      border-radius: 12px; font-size: 1rem; outline: none; transition: all 0.3s;
    }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79,70,229,0.1); }
    .btn {
      width: 100%; padding: 1rem; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; box-shadow: 0 4px 14px rgba(79,70,229,0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,70,229,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .shake { animation: shake 0.4s ease; }
    .info-box {
      background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px;
      padding: 0.75rem; margin-top: 1.5rem; font-size: 0.8rem; color: #0369a1; text-align: left;
    }
    .info-box strong { color: var(--primary); }
  </style>
</head>
<body>
  <div class="login-card" id="loginCard">
    <div class="login-logo">🔐</div>
    <h1>Admin Login</h1>
    <p>VidyaFree Content Management</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <div class="error-msg" id="errorMsg">Invalid username or password</div>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>
    <div class="info-box">
      <strong>Default:</strong> Username: <code>admin</code> | Password: <code>vidyafree123</code><br>
      <span style="color:var(--gray)">You can change this in Settings after login.</span>
    </div>
  </div>

  <script>
    const DEFAULT_USER = 'admin';
    const DEFAULT_PASS = 'vidyafree123';
    const AUTH_KEY = 'vf_admin_auth';
    const PASS_KEY = 'vf_admin_password';

    if (localStorage.getItem(AUTH_KEY) === 'true') {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const error = document.getElementById('errorMsg');
      const card = document.getElementById('loginCard');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';

      setTimeout(() => {
        const storedPass = localStorage.getItem(PASS_KEY) || DEFAULT_PASS;
        if (user === DEFAULT_USER && pass === storedPass) {
          localStorage.setItem(AUTH_KEY, 'true');
          localStorage.setItem('vf_admin_user', user);
          window.location.href = 'dashboard.html';
        } else {
          error.style.display = 'block';
          card.classList.add('shake');
          setTimeout(() => card.classList.remove('shake'), 400);
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
        }
      }, 600);
    });
  </script>
</body>
</html>
